# GitHub Pages configuration — year-of-ai/2011
# A thin remote_theme consumer: this repo holds only content; the shared
# zer0-mistakes theme is pulled in at build time (no theme files vendored).
# The seed + growth orchestration live in the hub (year-of-ai/year-of-ai.github.io).
site_configured: true
title: "The Year 2011"
description: "A self-growing knowledge base about the year 2011"
github_user: "year-of-ai"
repository_name: "2011"
repository: "year-of-ai/2011"
url: "https://year-of-ai.github.io"
baseurl: "/2011"
remote_theme: "bamr87/zer0-mistakes"
markdown: kramdown
kramdown:
  input: GFM
permalink: pretty
# README.md becomes the site homepage via jekyll-readme-index.
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-readme-index
  - jekyll-default-layout
  - jekyll-titles-from-headings
optional_front_matter:
  remove_originals: true
relative_links:
  enabled: true
titles_from_headings:
  enabled: true
  strip_title: false
defaults:
  - scope:
      path: ""
    values:
      layout: default
      hide_intro: true
      author_profile: false
      read_time: true
      share: true
# Kept in the repo but NOT published as site pages.
exclude:
  - CLAUDE.md
  - .claude/
  - telemetry/
